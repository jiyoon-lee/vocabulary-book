<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>영단어 단어장1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-indigo-600 text-white sticky top-0 z-50 shadow-md">
      <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
        <button
          id="btn-back"
          class="hidden p-1 rounded-lg active:bg-indigo-700"
          onclick="goBack()"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            />
          </svg>
        </button>
        <h1 id="page-title" class="text-lg font-bold">🎉</h1>
        <div class="w-8"></div>
      </div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-24">
      <!-- View: Home -->
      <div id="view-home">
        <div class="py-6">
          <p class="text-gray-500 text-sm mb-6 text-center">
            카테고리를 선택하세요
          </p>
          <div id="category-list" class="space-y-3"></div>

          <!-- Add category -->
          <div id="add-category-form" class="hidden mt-3">
            <div class="flex gap-2">
              <input id="new-category-name" type="text" placeholder="카테고리 이름 (예: 3강)"
                class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-400"
                onkeydown="if(event.key==='Enter') saveCategory()"
                onkeydown="if(event.key==='Escape') closeCategoryForm()">
              <button onclick="saveCategory()" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold active:bg-indigo-700">추가</button>
              <button onclick="closeCategoryForm()" class="px-3 py-2 border border-gray-200 rounded-xl text-sm text-gray-500 active:bg-gray-50">취소</button>
            </div>
          </div>
          <button onclick="openCategoryForm()"
            id="btn-add-category"
            class="w-full mt-3 py-2.5 rounded-xl border border-dashed border-gray-300 text-gray-400 text-sm flex items-center justify-center gap-1 active:bg-gray-50">
            + 카테고리 추가
          </button>

        </div>
      </div>

      <!-- View: Category -->
      <div id="view-category" class="hidden">
        <!-- Mode tabs -->
        <div
          class="flex border-b border-gray-200 mb-4 mt-4 sticky top-14 bg-gray-50 z-40 overflow-x-auto"
        >
          <button
            class="mode-tab shrink-0 px-4 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 whitespace-nowrap"
            data-mode="list"
            onclick="switchMode('list')"
          >
            전체 목록
          </button>
          <button
            class="mode-tab shrink-0 px-4 py-2 text-sm font-medium text-gray-400 whitespace-nowrap"
            data-mode="quiz-en"
            onclick="switchMode('quiz-en')"
          >
            뜻 → 영어
          </button>
          <button
            class="mode-tab shrink-0 px-4 py-2 text-sm font-medium text-gray-400 whitespace-nowrap"
            data-mode="quiz-ko"
            onclick="switchMode('quiz-ko')"
          >
            영어 → 뜻
          </button>
          <button
            class="mode-tab shrink-0 px-4 py-2 text-sm font-medium text-gray-400 whitespace-nowrap"
            data-mode="favorites"
            onclick="switchMode('favorites')"
          >
            ★ 즐겨찾기
          </button>
        </div>

        <!-- List mode -->
        <div id="mode-list">
          <div class="list-only-controls flex gap-2 mb-3 mt-4">
            <button
              onclick="openAddWord()"
              class="flex-1 py-2 text-xs font-semibold rounded-lg border border-indigo-200 text-indigo-600 bg-white active:bg-indigo-50"
            >
              + 단어 추가
            </button>
          </div>
          <div class="list-only-controls flex gap-2 mb-4">
            <button
              id="btn-hide-en"
              class="flex-1 py-2 text-xs rounded-lg border font-medium transition-colors"
              onclick="toggleHide('en')"
            >
              영어 가리기
            </button>
            <button
              id="btn-hide-ko"
              class="flex-1 py-2 text-xs rounded-lg border font-medium transition-colors"
              onclick="toggleHide('ko')"
            >
              뜻 가리기
            </button>
          </div>
          <div id="word-list" class="space-y-3"></div>
          <!-- 채점 버튼 -->
          <div id="grade-btn-wrap" class="hidden mt-6 mb-4">
            <button
              onclick="gradeAll()"
              class="w-full py-4 bg-indigo-600 text-white font-bold text-base rounded-xl active:bg-indigo-700 shadow-md"
            >
              채점하기
            </button>
          </div>
        </div>

        <!-- Quiz mode -->
        <div id="mode-quiz" class="hidden">
          <div id="quiz-container"></div>
        </div>
      </div>

    </main>

    <!-- Word Add/Edit Modal -->
    <dialog
      id="word-modal"
      class="fixed bottom-0 left-0 right-0 m-0 w-full max-w-full max-h-[90vh] overflow-y-auto rounded-t-2xl p-4 pb-10 border-0 shadow-2xl backdrop:bg-black/50"
    >
      <div class="flex items-center justify-between mb-4">
        <h2 id="modal-title" class="text-base font-bold text-gray-800">
          단어 추가
        </h2>
        <button
          onclick="closeWordModal()"
          class="text-gray-400 text-xl leading-none px-1"
        >
          ✕
        </button>
      </div>
      <div id="modal-form"></div>
      <button
        onclick="saveWord()"
        class="w-full py-3 bg-indigo-600 text-white font-bold text-sm rounded-xl mt-5 active:bg-indigo-700"
      >
        저장
      </button>
    </dialog>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none z-50"
    ></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
