<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>영단어 단어장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-indigo-600 text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
      <button id="btn-back" class="hidden p-1 rounded-lg active:bg-indigo-700" onclick="goBack()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 id="page-title" class="text-lg font-bold">영단어 단어장</h1>
      <div class="w-8"></div>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 pb-24">

    <!-- View: Home -->
    <div id="view-home">
      <div class="py-6">
        <p class="text-gray-500 text-sm mb-6 text-center">카테고리를 선택하세요</p>
        <div id="category-list" class="space-y-3"></div>

        <!-- Score summary -->
        <div class="mt-8">
          <h2 class="text-base font-semibold text-gray-700 mb-3">최근 퀴즈 기록</h2>
          <div id="score-summary" class="space-y-2"></div>
          <div id="score-empty" class="hidden text-sm text-gray-400 text-center py-4">아직 퀴즈 기록이 없습니다.</div>
          <button id="btn-clear-scores" class="hidden mt-3 text-xs text-red-400 underline w-full text-center" onclick="clearScores()">기록 모두 삭제</button>
        </div>
      </div>
    </div>

    <!-- View: Category -->
    <div id="view-category" class="hidden">
      <!-- Mode tabs -->
      <div class="flex border-b border-gray-200 mb-4 mt-4 sticky top-14 bg-gray-50 z-40">
        <button class="mode-tab flex-1 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600" data-mode="list" onclick="switchMode('list')">전체 목록</button>
        <button class="mode-tab flex-1 py-2 text-sm font-medium text-gray-400" data-mode="quiz-en" onclick="switchMode('quiz-en')">뜻 → 영어</button>
        <button class="mode-tab flex-1 py-2 text-sm font-medium text-gray-400" data-mode="quiz-ko" onclick="switchMode('quiz-ko')">영어 → 뜻</button>
      </div>

      <!-- List mode -->
      <div id="mode-list">
        <div class="flex gap-2 mb-4">
          <button id="btn-hide-en" class="flex-1 py-2 text-xs rounded-lg border font-medium transition-colors"
            onclick="toggleHide('en')">영어 가리기</button>
          <button id="btn-hide-ko" class="flex-1 py-2 text-xs rounded-lg border font-medium transition-colors"
            onclick="toggleHide('ko')">뜻 가리기</button>
        </div>
        <div id="word-list" class="space-y-3"></div>
      </div>

      <!-- Quiz mode -->
      <div id="mode-quiz" class="hidden">
        <div id="quiz-container"></div>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

  <script src="app.js"></script>
</body>
</html>
