<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>영단어 단어장1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-indigo-600 text-white sticky top-0 z-50 shadow-md">
      <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
        <button
          id="btn-back"
          class="hidden p-1 rounded-lg active:bg-indigo-700"
          onclick="goBack()"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            />
          </svg>
        </button>
        <h1 id="page-title" class="text-lg font-bold">영단어 단어장</h1>
        <div class="w-8"></div>
      </div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-24">
      <!-- View: Home -->
      <div id="view-home">
        <div class="py-6">
          <p class="text-gray-500 text-sm mb-6 text-center">
            카테고리를 선택하세요
          </p>
          <div id="category-list" class="space-y-3"></div>

          <!-- History link -->
          <button
            onclick="showView('history')"
            class="w-full mt-6 py-3 rounded-xl border border-gray-200 bg-white text-gray-600 text-sm font-medium flex items-center justify-center gap-2 active:bg-gray-50"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
            학습 기록 보기
          </button>

          <button
            onclick="reloadFromJson()"
            class="w-full mt-3 py-2 text-xs text-gray-400 flex items-center justify-center gap-1 active:text-gray-600"
          >
            <svg
              class="w-3.5 h-3.5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              />
            </svg>
            단어 데이터 새로고침
          </button>

          <!-- 백업/복원 -->
          <button
            onclick="toggleBackupPanel()"
            class="w-full mt-2 py-2 text-xs text-gray-400 flex items-center justify-center gap-1 active:text-gray-600"
          >
            <svg
              class="w-3.5 h-3.5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
              />
            </svg>
            내 단어 백업 / 복원
          </button>
          <div
            id="backup-panel"
            class="hidden mt-2 bg-white rounded-xl p-4 shadow-sm border border-gray-100"
          >
            <p class="text-xs text-gray-500 mb-2">
              내가 추가한 단어를 백업해두면 데이터가 지워져도 복원할 수
              있습니다.
            </p>
            <textarea
              id="backup-text"
              class="w-full h-28 text-xs border border-gray-200 rounded-lg p-2 resize-none focus:outline-none focus:border-indigo-400"
              placeholder="내보내기를 눌러 백업 코드를 확인하거나&#10;백업 코드를 붙여넣고 가져오기를 누르세요"
            ></textarea>
            <div class="flex gap-2 mt-2">
              <button
                onclick="exportBackup()"
                class="flex-1 py-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white active:bg-indigo-700"
              >
                내보내기
              </button>
              <button
                onclick="importBackup()"
                class="flex-1 py-2 text-xs font-semibold rounded-lg border border-indigo-200 text-indigo-600 bg-white active:bg-indigo-50"
              >
                가져오기
              </button>
            </div>

            <!-- GitHub 자동 동기화 -->
            <div class="border-t border-gray-100 pt-3 mt-3">
              <p class="text-xs font-semibold text-gray-600 mb-1">GitHub 자동 동기화</p>
              <p class="text-xs text-gray-400 mb-2">Personal Access Token(repo 권한)을 저장하면 단어 추가·삭제 시 자동으로 GitHub에 저장되어, 배포 후에도 단어가 유지됩니다.</p>
              <input id="gh-token-input" type="password" placeholder="ghp_..."
                class="w-full text-xs border border-gray-200 rounded-lg px-2 py-1.5 mb-2 focus:outline-none focus:border-indigo-400">
              <button onclick="saveGhToken()"
                class="w-full py-2 text-xs font-semibold rounded-lg border border-gray-200 text-gray-700 bg-white active:bg-gray-50">
                토큰 저장
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- View: Category -->
      <div id="view-category" class="hidden">
        <!-- Mode tabs -->
        <div
          class="flex border-b border-gray-200 mb-4 mt-4 sticky top-14 bg-gray-50 z-40"
        >
          <button
            class="mode-tab flex-1 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600"
            data-mode="list"
            onclick="switchMode('list')"
          >
            전체 목록
          </button>
          <button
            class="mode-tab flex-1 py-2 text-sm font-medium text-gray-400"
            data-mode="quiz-en"
            onclick="switchMode('quiz-en')"
          >
            뜻 → 영어
          </button>
          <button
            class="mode-tab flex-1 py-2 text-sm font-medium text-gray-400"
            data-mode="quiz-ko"
            onclick="switchMode('quiz-ko')"
          >
            영어 → 뜻
          </button>
        </div>

        <!-- List mode -->
        <div id="mode-list">
          <div class="flex gap-2 mb-3 mt-4">
            <button
              onclick="openAddWord()"
              class="flex-1 py-2 text-xs font-semibold rounded-lg border border-indigo-200 text-indigo-600 bg-white active:bg-indigo-50"
            >
              + 단어 추가
            </button>
          </div>
          <div class="flex gap-2 mb-4">
            <button
              id="btn-hide-en"
              class="flex-1 py-2 text-xs rounded-lg border font-medium transition-colors"
              onclick="toggleHide('en')"
            >
              영어 가리기
            </button>
            <button
              id="btn-hide-ko"
              class="flex-1 py-2 text-xs rounded-lg border font-medium transition-colors"
              onclick="toggleHide('ko')"
            >
              뜻 가리기
            </button>
          </div>
          <div id="word-list" class="space-y-3"></div>
          <!-- 채점 버튼 -->
          <div id="grade-btn-wrap" class="hidden mt-6 mb-4">
            <button
              onclick="gradeAll()"
              class="w-full py-4 bg-indigo-600 text-white font-bold text-base rounded-xl active:bg-indigo-700 shadow-md"
            >
              채점하기
            </button>
          </div>
        </div>

        <!-- Quiz mode -->
        <div id="mode-quiz" class="hidden">
          <div id="quiz-container"></div>
        </div>
      </div>

      <!-- View: History (list) -->
      <div id="view-history" class="hidden">
        <div class="py-4">
          <div id="history-list-container"></div>
        </div>
      </div>

      <!-- View: History Detail (정오표) -->
      <div id="view-history-detail" class="hidden">
        <div class="py-4">
          <div id="history-detail-container"></div>
        </div>
      </div>
    </main>

    <!-- Word Add/Edit Modal -->
    <dialog
      id="word-modal"
      class="fixed bottom-0 left-0 right-0 m-0 w-full max-w-full max-h-[90vh] overflow-y-auto rounded-t-2xl p-4 pb-10 border-0 shadow-2xl backdrop:bg-black/50"
    >
      <div class="flex items-center justify-between mb-4">
        <h2 id="modal-title" class="text-base font-bold text-gray-800">
          단어 추가
        </h2>
        <button
          onclick="closeWordModal()"
          class="text-gray-400 text-xl leading-none px-1"
        >
          ✕
        </button>
      </div>
      <div id="modal-form"></div>
      <button
        onclick="saveWord()"
        class="w-full py-3 bg-indigo-600 text-white font-bold text-sm rounded-xl mt-5 active:bg-indigo-700"
      >
        저장
      </button>
    </dialog>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none z-50"
    ></div>

    <script src="app.js"></script>
  </body>
</html>
